<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>彭璐颖 - 个人主页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo">Glamline</a>
      <button class="hamburger" id="hamburger" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="#about">关于我</a></li>
        <li><a href="#hobbies">兴趣爱好</a></li>
        <li><a href="#contact">联系我</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero 区域 -->
  <section class="hero">
    <div class="hero-content fade-in">
      <div class="avatar-wrapper">
        <img src="image_1751212591976.png" alt="彭璐颖的头像">
      </div>
      <h1>彭璐颖</h1>
      <p class="hero-subtitle">写写画画，记录生活的每一刻</p>
    </div>
  </section>

  <!-- 关于我 -->
  <section class="section" id="about">
    <div class="container">
      <h2 class="section-title fade-in">关于我</h2>
      <div class="card fade-in">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
          </svg>
        </div>
        <div class="card-body">
          <h3>Hello! 我是彭璐颖</h3>
          <p>来自六朝古都<strong>南京</strong>，一个热爱生活的创作者。</p>
          <p>擅长<strong>写写画画</strong>，用文字和画笔记录世界的美好。</p>
        </div>
      </div>
    </div>
  </section>

  <!-- 兴趣爱好 -->
  <section class="section section-alt" id="hobbies">
    <div class="container">
      <h2 class="section-title fade-in">兴趣爱好</h2>
      <div class="hobbies-grid">
        <div class="card hobby-card fade-in">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </div>
          <div class="card-body">
            <h3>阅读</h3>
            <p>沉浸在文字的世界里，感受每一本书带来的思考与共鸣。</p>
          </div>
        </div>
        <div class="card hobby-card fade-in">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polygon points="10,8 16,12 10,16"/>
            </svg>
          </div>
          <div class="card-body">
            <h3>电影</h3>
            <p>豆瓣 <strong>Top 250</strong> 已看过 <strong>200 部</strong>，每一帧画面都是生活的启示。</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 联系我 -->
  <section class="section" id="contact">
    <div class="container">
      <h2 class="section-title fade-in">联系我</h2>
      <div class="card contact-card fade-in">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 4l10 9 10-9"/>
          </svg>
        </div>
        <div class="card-body">
          <h3>邮箱联系</h3>
          <p>有任何想法或合作意向，欢迎随时联系我：</p>
          <a href="mailto:caroline_ply@163.com" class="email-link">caroline_ply@163.com</a>
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <p>&copy; 2026 Caroline | 用心生活，用爱创作</p>
  </footer>

  <script src="script.js"></script>

</html>
